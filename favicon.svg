<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="sync-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="1" stdDeviation="1.5" flood-color="#3b82f6" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Beautiful rounded base circle -->
  <rect width="32" height="32" rx="8" fill="#0d131e" />
  <!-- Icon Graphics: Two stylized synchronized curved arrows forming a loop -->
  <g filter="url(#glow)">
    <!-- Arc 1 -->
    <path d="M 16 6 A 10 10 0 0 1 25.14 12 L 22.5 12 A 7 7 0 0 0 16 9" fill="none" stroke="url(#sync-grad)" stroke-width="2.5" stroke-linecap="round" />
    <!-- Arrowhead 1 -->
    <path d="M 26 8 L 26 13 L 21 13" fill="none" stroke="url(#sync-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Arc 2 -->
    <path d="M 16 26 A 10 10 0 0 1 6.86 20 L 9.5 20 A 7 7 0 0 0 16 23" fill="none" stroke="url(#sync-grad)" stroke-width="2.5" stroke-linecap="round" />
    <!-- Arrowhead 2 -->
    <path d="M 6 24 L 6 19 L 11 19" fill="none" stroke="url(#sync-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Central synchronized connection core -->
    <circle cx="16" cy="16" r="3" fill="#10b981" />
  </g>
</svg>
